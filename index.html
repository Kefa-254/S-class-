<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mercedes S-Class E-Card</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      font-family: Arial, sans-serif;
      color: white;
    }
    .card-container {
      perspective: 1000px;
      width: 90%;
      max-width: 380px;
    }
    .card {
      width: 100%;
      height: 520px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1.2s ease;
      cursor: pointer;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .card.flipped {
      transform: rotateY(180deg);
    }
    .front, .back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .front {
      background: linear-gradient(to bottom, #1e3c72, #2a5298);
    }
    .back {
      background: #111;
      transform: rotateY(180deg);
    }
    h1 {
      margin: 10px 0;
      font-size: 2em;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
    .video-frame {
      width: 100%;
      height: 200px;
      border: none;
      border-radius: 12px;
      margin: 15px 0;
    }
    .specs {
      font-size: 1em;
      line-height: 1.5;
      text-align: center;
      max-width: 90%;
    }
    .emoji {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="card-container">
    <div class="card" onclick="this.classList.toggle('flipped')">
      <div class="front">
        <div class="emoji">🎩✨</div>
        <h1>Mercedes-Benz S-Class</h1>
        <p>Tap to open luxury</p>
      </div>
      <div class="back">
        <h1>S-Class 2026</h1>
        <iframe class="video-frame" src="S-class.mp4" title="S-Class Reveal" frameborder="0" allowfullscreen></iframe>
        <div class="specs">
          <strong>Power:</strong> 442 hp (S 500)  turbo engine<br>
          <strong>Torque:</strong> 413–516 lb-ft<br>
          <strong>0-60 mph:</strong> \~4.5–4.3 sec<br>
          <strong>Drive:</strong> 4MATIC AWD • 9-speed auto<br>
          <strong>Highlights:</strong> MBUX Hyperscreen, AIRMATIC suspension, supreme comfort
        </div>
        <p style="margin-top:10px;">Personalize & send via WhatsApp!</p>
      </div>
    </div>
  </div>
</body>
</html>
